{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <title>Add Review</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

        <a href="{% url 'index' %}">Home</a>

    <div class="content">

</html>
