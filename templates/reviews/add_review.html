{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Review</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'add_review' %}">Add Review</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>
    </nav>

    <div class="content">
        <h1>Submit a New Review</h1>

        <div class="time-hud">
            LOCAL TIME: <span id="local-clock">{% now "H:i" %}</span>
        </div>

        <div class="stats-box">
            <form method="POST">
                {% csrf_token %} {{ form.as_p }}
                <button type="submit" class="submit-btn">Post Review</button>
            </form>
        </div>
    </div>

    <script>
        function setLocalTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('local-clock').textContent = `${hours}:${minutes}`;
        }
        setLocalTime();
    </script>

</body>
</html>
