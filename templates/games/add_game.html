{% extends 'base.html' %}

{% block title %}Add Game - GameVault{% endblock %}

{% block content %}
    <h1>Register a New Game</h1>

    <div class="stats-box">
        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
                <div style="color: #ff007c; border: 1px solid #ff007c; padding: 15px; margin-bottom: 20px; background: rgba(255, 0, 124, 0.1);">
                    <strong>System Error: Please fix the following:</strong>
                    {{ form.errors }}
                </div>
            {% endif %}

            <div class="form-container">
                {{ form.as_p }}
            </div>

            <button type="submit" class="submit-btn" style="margin-top: 20px;">Save Game</button>
        </form>
    </div>
{% endblock %}
