{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Game</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'game_catalog' %}">Browse Games</a>
        <a href="{% url 'add_game' %}">Add Game</a>
        <a href="{% url 'review_list' %}">Reviews</a>
        <a href="{% url 'add_review' %}">Add Review</a>
        <a href="{% url 'about' %}">About</a>
    </nav>

    <div class="content">
        <h1>Register a New Game</h1>

        <div class="stats-box">
            <form method="POST">
                {% csrf_token %} {{ form.as_p }}
                <button type="submit" class="submit-btn">Save Game</button>
            </form>
        </div>
    </div>
</body>
</html>
