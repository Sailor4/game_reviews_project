{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}GameVault{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'game_catalog' %}"> Game Catalog</a>
        <a href="{% url 'add_game' %}">Add Game</a>
        <a href="{% url 'review_list' %}">Reviews</a>
        <a href="{% url 'add_review' %}">Add Review</a>
        <a href="{% url 'community_stats' %}">Stats</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>

        <form action="{% url 'search_games' %}" method="GET" style="display: inline-block; margin-left: 20px;">
            <input type="text" name="q" placeholder="Search..." style="width: 120px; padding: 5px; border-radius: 4px; border: 1px solid #00d4ff; background: #1e1e2f; color: white;">
            <button type="submit" style="background: #00d4ff; color: #1e1e2f; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">GO</button>
        </form>
    </nav>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <footer style="margin-top: 50px; text-align: center; opacity: 0.4; font-size: 0.8rem;">
        <p>&copy; 2026 GameVault - Built for SoftUni Django Basics</p>
    </footer>
</body>
</html>
